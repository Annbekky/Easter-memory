<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: url('https://i.postimg.cc/bwXyP1zL/Gemini-Generated-Image-dedv8adedv8adedv.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 8px;
            overflow-x: hidden;
        }

        .container {
            max-width: 100vw;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(3px);
            z-index: 0;
        }

        header {
            text-align: center;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.4em;
            color: #fff;
            text-shadow: 1px 1px 0px #fd79a8;
            margin-bottom: 2px;
            animation: bounce 2s infinite;
        }

        .subtitle {
            font-size: 0.7em;
            color: #fff;
            background: rgba(255,255,255,0.3);
            padding: 3px 8px;
            border-radius: 50px;
            display: inline-block;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .player-score {
            background: white;
            padding: 4px 10px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 0.7em;
            font-weight: 700;
            transition: transform 0.3s;
        }

        .player-score.active {
            transform: scale(1.05);
            box-shadow: 0 2px 12px rgba(253, 121, 168, 0.4);
            border: 2px solid #fd79a8;
        }

        .player-score.player1 { color: #0984e3; }
        .player-score.player2 { color: #e17055; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 8px;
            perspective: 1000px;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.4);
            padding: 6px;
            border-radius: 15px;
            width: 88vw;
            max-width: 480px;
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matchPulse 0.6s;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card-front {
            background: url('https://i.postimg.cc/FsCSVWVB/9.png') no-repeat center center;
            background-size: cover;
            border: 2px solid #fff;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
            border: 2px solid #fff;
            padding: 2px;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
            margin-bottom: 8px;
        }

        .btn {
            padding: 5px 10px;
            font-size: 0.65em;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Nunito', sans-serif;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%);
            color: white;
        }

        .btn-help {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            color: white;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            padding: 18px;
            border-radius: 20px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            animation: modalPop 0.3s;
            position: relative;
        }

        .modal h2 {
            color: #6c5ce7;
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .quiz-question {
            font-size: 0.95em;
            color: #2d3436;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .quiz-option {
            padding: 7px 10px;
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
            border: none;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
        }

        .quiz-option:hover {
            transform: translateX(5px);
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            color: white;
        }

        .quiz-option.correct {
            background: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
            color: white;
            animation: correctPulse 0.5s;
        }

        .quiz-option.wrong {
            background: linear-gradient(135deg, #d63031 0%, #ff7675 100%);
            color: white;
            animation: shake 0.5s;
        }

        .close-modal {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 1.2em;
            cursor: pointer;
            color: #b2bec3;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #d63031;
        }

        .winner-text {
            font-size: 0.95em;
            color: #2d3436;
            margin: 10px 0;
        }

        .help-text {
            font-size: 0.7em;
            line-height: 1.5;
            color: #636e72;
            text-align: left;
        }

        .help-text ul {
            margin-left: 12px;
            margin-top: 6px;
        }

        .help-text li {
            margin-bottom: 3px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        @keyframes correctPulse {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="game-overlay"></div>
    
    <div class="container">
        <header>
            <h1>🐰 Easter Memory 🥚</h1>
            <p class="subtitle">Match pairs, answer the quiz to score!</p>
        </header>

        <div class="score-board" role="region" aria-label="Score board" aria-live="polite">
            <div class="player-score player1 active" id="player1Score">
                🐣 P1: <span id="score1">0</span>
            </div>
            <div class="player-score player2" id="player2Score">
                🐥 P2: <span id="score2">0</span>
            </div>
            <div class="player-score" id="currentTurn">
                🎯 <span id="turnIndicator">P1</span>
            </div>
        </div>

        <div class="game-grid" id="gameGrid" role="grid" aria-label="Memory game grid">
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">🔄 New</button>
            <button class="btn btn-secondary" onclick="passTurn()">⏭️ Pass</button>
            <button class="btn btn-help" onclick="showHelp()">❓ Help</button>
        </div>
    </div>

    <div class="modal-overlay" id="quizModal" role="dialog" aria-label="Quiz question">
        <div class="modal">
            <span class="close-modal" onclick="closeModal('quizModal')">&times;</span>
            <h2>🎉 Match!</h2>
            <div class="quiz-question" id="quizQuestion"></div>
            <div class="quiz-options" id="quizOptions"></div>
        </div>
    </div>

    <div class="modal-overlay" id="winnerModal" role="dialog" aria-label="Game over">
        <div class="modal">
            <span class="close-modal" onclick="closeModal('winnerModal')">&times;</span>
            <h2>🏆 Game Over!</h2>
            <div class="winner-text" id="winnerText"></div>
            <button class="btn btn-primary" onclick="newGame(); closeModal('winnerModal');">Play Again</button>
        </div>
    </div>

    <div class="modal-overlay" id="helpModal" role="dialog" aria-label="Help instructions">
        <div class="modal">
            <span class="close-modal" onclick="closeModal('helpModal')">&times;</span>
            <h2>📖 How to Play</h2>
            <div class="help-text">
                <ul>
                    <li>🎮 Two players take turns</li>
                    <li>🔍 Find matching pairs</li>
                    <li>❓ Answer quiz on match</li>
                    <li>✅ Correct = +1 point</li>
                    <li>❌ Wrong = turn passes</li>
                    <li>🏆 Most points wins!</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let currentPlayer = 1;
        let scores = { 1: 0, 2: 0 };
        let flippedCards = [];
        let matchedPairs = 0;
        let isProcessing = false;
        let usedQuestions = new Set();

        const cardData = [
            { id: 1, name: 'bunny', src: 'https://i.postimg.cc/Nj04g2pd/7.png' },
            { id: 2, name: 'egg', src: 'https://i.postimg.cc/VkNRY0D7/5.png' },
            { id: 3, name: 'chick', src: 'https://i.postimg.cc/FHKZ9kDV/6.png' },
            { id: 4, name: 'basket', src: 'https://i.postimg.cc/cLJmstX5/Gemini_Generated_Image_mkas1qmkas1qmkas.png' },
            { id: 5, name: 'buns', src: 'https://i.postimg.cc/rwpJ8RQQ/8.png' },
            { id: 6, name: 'flowers', src: 'https://i.postimg.cc/PrDL1XJ9/12.png' },
            { id: 7, name: 'lamb', src: 'https://i.postimg.cc/VLtSXfv3/10.png' },
            { id: 8, name: 'decoration', src: 'https://i.postimg.cc/GhDBvLtN/11.png' }
        ];

        const quizQuestions = [
            { q: "She ___ a pet cat.", options: ["has got", "is", "can"], correct: 0 },
            { q: "I ___ from France.", options: ["am", "are", "has got"], correct: 0 },
            { q: "He ___ a doctor.", options: ["is", "am", "can"], correct: 0 },
            { q: "We ___ friends.", options: ["are", "is", "has got"], correct: 0 },
            { q: "You ___ run fast.", options: ["can", "am", "is"], correct: 0 },
            { q: "It ___ long hair.", options: ["has got", "are", "can"], correct: 0 },
            { q: "They ___ in the garden.", options: ["are", "is", "has got"], correct: 0 },
            { q: "My brother ___ play the guitar.", options: ["can", "has got", "am"], correct: 0 },
            { q: "I ___ hungry.", options: ["am", "is", "are"], correct: 0 },
            { q: "The sky ___ blue.", options: ["is", "has got", "can"], correct: 0 },
            { q: "She ___ swim very well.", options: ["can", "has got", "are"], correct: 0 },
            { q: "We ___ a big house.", options: ["have got", "is", "can"], correct: 0 },
            { q: "He ___ my best friend.", options: ["is", "can", "have got"], correct: 0 },
            { q: "They ___ three dogs.", options: ["have got", "is", "can"], correct: 0 },
            { q: "I ___ play tennis.", options: ["can", "has got", "are"], correct: 0 },
            { q: "The cat ___ white fur.", options: ["has got", "can", "are"], correct: 0 },
            { q: "You ___ very kind.", options: ["are", "has got", "can"], correct: 0 },
            { q: "She ___ a beautiful voice.", options: ["has got", "can", "are"], correct: 0 },
            { q: "We ___ at school.", options: ["are", "has got", "can"], correct: 0 },
            { q: "It ___ jump high.", options: ["can", "has got", "is"], correct: 0 }
        ];

        function initGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            let cards = [...cardData, ...cardData];
            cards = shuffle(cards);
            
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.dataset.id = card.id;
                cardEl.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">
                        <img src="${card.src}" alt="${card.name}">
                    </div>
                `;
                cardEl.addEventListener('click', () => flipCard(cardEl));
                grid.appendChild(cardEl);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function flipCard(card) {
            if (isProcessing || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if (flippedCards.length === 2) {
                isProcessing = true;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.id === card2.dataset.id;
            setTimeout(() => {
                if (match) {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    showQuiz();
                } else {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    switchTurn();
                    isProcessing = false;
                    flippedCards = [];
                }
            }, 1000);
        }

        function showQuiz() {
    const availableQuestions = quizQuestions.filter((_, idx) => !usedQuestions.has(idx));
    if (availableQuestions.length === 0) usedQuestions.clear();
    let questionIndex;
    do {
        questionIndex = Math.floor(Math.random() * quizQuestions.length);
    } while (usedQuestions.has(questionIndex));
    usedQuestions.add(questionIndex);
    const question = quizQuestions[questionIndex];
    document.getElementById('quizQuestion').textContent = question.q;
    const optionsDiv = document.getElementById('quizOptions');
    optionsDiv.innerHTML = '';
    
    // Создаем массив индексов и перемешиваем его
    let shuffledIndices = [0, 1, 2];
    for (let i = shuffledIndices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];
    }
    
    // Находим новую позицию правильного ответа
    let newCorrectIndex = shuffledIndices.indexOf(question.correct);
    
    // Отображаем ответы в перемешанном порядке
    shuffledIndices.forEach((originalIndex, displayIndex) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option';
        btn.textContent = question.options[originalIndex];
        btn.onclick = () => checkAnswer(displayIndex, newCorrectIndex);
        optionsDiv.appendChild(btn);
    });
    
    document.getElementById('quizModal').classList.add('active');
}

        function checkAnswer(selected, correct) {
            const buttons = document.querySelectorAll('.quiz-option');
            buttons[selected].classList.add(selected === correct ? 'correct' : 'wrong');
            if (selected === correct) {
                scores[currentPlayer]++;
                updateScores();
                setTimeout(() => {
                    closeModal('quizModal');
                    flippedCards = [];
                    isProcessing = false;
                    checkGameEnd();
                }, 1500);
            } else {
                setTimeout(() => {
                    closeModal('quizModal');
                    flippedCards.forEach(card => card.classList.remove('flipped'));
                    flippedCards = [];
                    isProcessing = false;
                    switchTurn();
                    checkGameEnd();
                }, 1500);
            }
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateTurnIndicator();
        }

        function updateScores() {
            document.getElementById('score1').textContent = scores[1];
            document.getElementById('score2').textContent = scores[2];
        }

        function updateTurnIndicator() {
            document.getElementById('turnIndicator').textContent = `P${currentPlayer}`;
            document.getElementById('player1Score').classList.toggle('active', currentPlayer === 1);
            document.getElementById('player2Score').classList.toggle('active', currentPlayer === 2);
        }

        function checkGameEnd() {
            if (matchedPairs === 8) {
                setTimeout(() => {
                    const winner = scores[1] > scores[2] ? 'Player 1' : scores[2] > scores[1] ? 'Player 2' : "It's a Tie";
                    document.getElementById('winnerText').textContent = scores[1] === scores[2] ? 
                        `🎊 ${winner}! 🎊\nScore: ${scores[1]} - ${scores[2]}` :
                        `🏆 ${winner} Wins! 🏆\nScore: ${scores[1]} - ${scores[2]}`;
                    document.getElementById('winnerModal').classList.add('active');
                }, 500);
            }
        }

        function newGame() {
            currentPlayer = 1;
            scores = { 1: 0, 2: 0 };
            flippedCards = [];
            matchedPairs = 0;
            isProcessing = false;
            usedQuestions.clear();
            updateScores();
            updateTurnIndicator();
            initGame();
        }

        function passTurn() {
            if (!isProcessing && flippedCards.length === 0) switchTurn();
        }

        function showHelp() {
            document.getElementById('helpModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(modal => modal.classList.remove('active'));
            }
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });

        initGame();
    </script>
</body>
</html>
